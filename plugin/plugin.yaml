name: hermes-iso27k
description: "ISO 27001 Annex A evidence collection and policy enforcement plugin for Hermes Agent"
version: 0.1.0
author: "derek-ai-dev"
license: MIT
hooks:
  - post_tool_call
  - on_session_end
  - on_config_change
slash_commands:
  - iso27k
toolsets:
  - iso27k

config_schema:
  type: object
  properties:
    enforcement:
      type: string
      enum: [permissive, enforce]
      default: permissive
      description: "permissive = log everything, block nothing; enforce = apply policy rules"
    retention_days:
      type: integer
      default: 365
    evidence_dir:
      type: string
      default: "${HERMES_HOME}/iso27k/evidence"
    audit_log:
      type: string
      default: "${HERMES_HOME}/iso27k/audit.jsonl"
    policy_file:
      type: string
      default: "${HERMES_HOME}/iso27k/policy.yaml"
